<!doctype html>
<html lang="ro">
<head>
<meta name="robots" content="noindex">
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@0,400;0,500&display=swap"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@0,400;0,500&display=swap" rel="stylesheet" media="print" onload="this.media='all'"><noscript><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Instrument+Sans:wght@0,400;0,500&display=swap" rel="stylesheet"></noscript>
<style>
  :root{--plum:#7A4E63;--plum-deep:#5E3A4C;--ochre:#C89A5B;--cream:#FAF6F0;--charcoal:#2E2A28}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  .og{width:1200px;height:630px;position:relative;background:var(--cream);
    display:flex;flex-direction:column;justify-content:center;padding:0 96px;
    font-family:"Instrument Sans",system-ui,sans-serif}
  .blob1{position:absolute;width:52%;height:88%;top:-20%;right:-10%;border-radius:47% 53% 44% 56%/55% 48% 52% 45%;
    background:radial-gradient(circle at 40% 40%, rgba(200,154,91,.55), rgba(200,154,91,.12));filter:blur(4px)}
  .blob2{position:absolute;width:40%;height:70%;bottom:-24%;left:-10%;border-radius:52% 48% 57% 43%/47% 55% 45% 53%;
    background:radial-gradient(circle at 50% 50%, rgba(122,78,99,.4), rgba(122,78,99,.08));filter:blur(4px)}
  .kicker{position:relative;font-size:22px;letter-spacing:.18em;text-transform:uppercase;color:#B07E3F;font-weight:600;margin-bottom:18px}
  .wm{position:relative;font-family:"Fraunces",serif;font-style:italic;font-weight:500;color:var(--plum-deep);
    font-size:120px;line-height:1;letter-spacing:-.01em}
  .tag{position:relative;font-family:"Fraunces",serif;font-style:italic;color:var(--plum);font-size:38px;margin-top:22px;max-width:26ch}
  .foot{position:relative;margin-top:40px;font-size:26px;letter-spacing:.06em;color:var(--charcoal);opacity:.75;font-weight:500}
  .foot b{color:#B07E3F}
</style>
</head>
<body>
  <div class="og">
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="kicker">Coaching individual</div>
    <div class="wm">Capitolul următor</div>
    <div class="tag">Coaching pentru femei care își doresc mai mult de la viață.</div>
    <div class="foot"><b>anamariabrad.ro</b></div>
  </div>
</body>
</html>
